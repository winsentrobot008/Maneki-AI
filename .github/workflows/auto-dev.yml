name: Auto Dev from Issues

on:
  issues:
    types: [opened]

jobs:
  plan-and-pr:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show issue info (debug)
        run: |
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Issue body: ${{ github.event.issue.body }}"

      - name: Create dummy change
        run: |
          echo "# Auto generated by AI" > AUTO_DEV_README.md

      - name: Commit and push changes
        run: |
          git config user.name "auto-dev-bot"
          git config user.email "auto-dev-bot@example.com"
          git checkout -b auto-dev-issue-${{ github.event.issue.number }}
          git add AUTO_DEV_README.md
          git commit -m "Auto dev for issue #${{ github.event.issue.number }}"
          git push origin auto-dev-issue-${{ github.event.issue.number }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto-dev-issue-${{ github.event.issue.number }}
          title: "Auto dev for #${{ github.event.issue.number }}"
          body: "This PR was auto-generated from issue #${{ github.event.issue.number }}."
